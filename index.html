<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手机专用-大字报教程生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-red: #ff3322;
            --step-yellow: #ffde00;
            --bg-gray: #f2f2f7;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; 
            background: var(--bg-gray); 
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* 顶部栏 */
        .top-bar {
            background: #fff; padding: 15px; text-align: center;
            border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100;
        }
        .top-bar h1 { margin: 0; font-size: 18px; color: #333; }
        .top-bar p { margin: 5px 0 0; font-size: 12px; color: #888; }

        /* 画布区 - 类似朋友圈/漫画的流式布局 */
        #scroll-area { flex: 1; overflow-y: auto; padding: 15px 10px 150px; }
        
        #tutorial-canvas { 
            background: var(--bg-gray); width: 100%; position: relative; 
            padding-bottom: 20px;
        }

        /* 每一步的容器 */
        .step-block {
            position: relative; margin-bottom: 30px; 
            background: #fff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #000;
        }
        .step-block img { width: 100%; display: block; }
        
        /* 漫画风格的步骤标签 */
        .step-tag {
            position: absolute; top: 10px; left: 10px;
            background: var(--step-yellow); color: #000;
            font-weight: 900; padding: 5px 15px; border-radius: 5px;
            border: 3px solid #000; transform: rotate(-2deg);
            box-shadow: 3px 3px 0 #000; z-index: 10;
        }

        /* 引导圈样式 */
        .marker { position: absolute; pointer-events: none; transform: translate(-50%, -50%); z-index: 50; }
        .rings { position: relative; width: 60px; height: 60px; }
        .ring { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 3px solid var(--primary-red); border-radius: 50%; 
        }
        .r1 { width: 20px; height: 20px; background: rgba(255,51,34,0.2); }
        .r2 { width: 40px; height: 40px; }
        .r3 { width: 60px; height: 60px; opacity: 0.5; border-style: dashed; }

        /* 引导大字报 */
        .bubble {
            position: absolute; left: 40px; top: -50px;
            background: #fff; border: 4px solid var(--primary-red);
            padding: 8px 15px; border-radius: 15px; white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .bubble-text { color: var(--primary-red); font-size: 28px; font-weight: 900; }
        .bubble-num {
            position: absolute; top: -15px; left: -15px;
            background: var(--primary-red); color: #fff;
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; border: 2px solid #fff;
        }

        /* 底部操作面板 */
        .bottom-ui {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; padding: 15px; border-top: 1px solid #eee;
            display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 200;
        }

        .edit-list { max-height: 80px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .edit-item { display: flex; align-items: center; gap: 10px; background: #f9f9f9; padding: 5px 10px; border-radius: 8px; }
        .edit-item input { flex: 1; border: none; background: transparent; font-size: 16px; padding: 5px; font-weight: bold; }

        .btn-group { display: flex; gap: 10px; }
        .btn {
            flex: 1; height: 55px; border-radius: 15px; border: none;
            font-size: 16px; font-weight: bold; display: flex;
            align-items: center; justify-content: center; gap: 8px;
        }
        .btn-add { background: #007aff; color: #fff; }
        .btn-save { background: var(--primary-red); color: #fff; }
        .btn-clear { background: #eee; color: #666; flex: 0.4; }

        /* 隐藏的文件输入 */
        #file-input { display: none; }

        /* 空白提示 */
        #empty-hint {
            text-align: center; padding: 100px 20px; color: #aaa;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>给爸妈的漫画教程</h1>
    <p>点击下方添加图片，点图上的位置写指令</p>
</div>

<div id="scroll-area">
    <div id="tutorial-canvas" onclick="handleCanvasClick(event)">
        <div id="empty-hint">
            <div style="font-size: 50px;">📸</div>
            <p>点击下方“添加下一步”<br>从手机相册选截图</p>
        </div>
        <div id="steps-container"></div>
    </div>
</div>

<div class="bottom-ui">
    <div class="edit-list" id="edit-list"></div>
    
    <div class="btn-group">
        <button class="btn btn-clear" onclick="location.reload()">清空</button>
        <button class="btn btn-add" onclick="document.getElementById('file-input').click()">
            <span>➕</span>添加下一步
        </button>
        <button class="btn btn-save" onclick="generateLongImage()">
            <span>💾</span>保存长图
        </button>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple onchange="loadImages(event)">
</div>

<script>
    let stepCount = 0;
    let markerCount = 0;
    const canvas = document.getElementById('tutorial-canvas');
    const stepsContainer = document.getElementById('steps-container');
    const editList = document.getElementById('edit-list');
    const emptyHint = document.getElementById('empty-hint');

    // 加载图片并生成步骤
    function loadImages(event) {
        const files = event.target.files;
        if (!files.length) return;

        emptyHint.style.display = 'none';

        Array.from(files).forEach(file => {
            stepCount++;
            const reader = new FileReader();
            reader.onload = (e) => {
                const block = document.createElement('div');
                block.className = 'step-block';
                block.innerHTML = `
                    <div class="step-tag">第 ${stepCount} 步</div>
                    <img src="${e.target.result}">
                `;
                stepsContainer.appendChild(block);
                
                // 滚动到最新添加的图
                setTimeout(() => {
                    block.scrollIntoView({ behavior: 'smooth' });
                }, 100);
            };
            reader.readAsDataURL(file);
        });
        event.target.value = ''; // 重置以支持重复上传
    }

    // 点击画布添加标注
    function handleCanvasClick(event) {
        // 如果点的是输入框或按钮则不触发
        if (event.target.tagName === 'INPUT' || event.target.closest('.btn-group')) return;
        if (stepCount === 0) return;

        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;

        markerCount++;
        const id = 'marker-' + Date.now();
        const defaultText = "点这里！";

        // 1. 创建图上的标记
        const marker = document.createElement('div');
        marker.className = 'marker';
        marker.id = id;
        marker.style.left = x + 'px';
        marker.style.top = y + 'px';
        marker.innerHTML = `
            <div class="rings"><div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div></div>
            <div class="bubble">
                <div class="bubble-num">${markerCount}</div>
                <div class="bubble-text" id="text-on-img-${id}">${defaultText}</div>
            </div>
        `;
        canvas.appendChild(marker);

        // 2. 创建底部编辑项
        const editItem = document.createElement('div');
        editItem.className = 'edit-item';
        editItem.id = 'edit-' + id;
        editItem.innerHTML = `
            <span style="color:var(--primary-red);font-weight:bold;">#${markerCount}</span>
            <input type="text" value="${defaultText}" oninput="syncText('${id}', this.value)">
            <span onclick="deleteMarker('${id}')" style="color:#ccc;font-size:20px;">×</span>
        `;
        editList.appendChild(editItem);
        
        // 自动聚焦并滚动列表
        editItem.querySelector('input').focus();
        editList.scrollTop = editList.scrollHeight;
    }

    function syncText(id, val) {
        document.getElementById('text-on-img-' + id).innerText = val || ' ';
    }

    function deleteMarker(id) {
        document.getElementById(id).remove();
        document.getElementById('edit-' + id).remove();
    }

    // 生成最终长图
    async function generateLongImage() {
        if (stepCount === 0) {
            alert("请先添加图片！");
            return;
        }

        const btn = document.querySelector('.btn-save');
        const originalText = btn.innerHTML;
        btn.innerHTML = "正在生成长图...";
        btn.disabled = true;

        // 隐藏不需要出现在截图里的元素
        try {
            const resultCanvas = await html2canvas(canvas, {
                useCORS: true,
                scale: 2, // 提高清晰度
                backgroundColor: "#f2f2f7",
                scrollX: 0,
                scrollY: -window.scrollY // 修复滚动偏移bug
            });

            // 在移动端，我们通常将图片显示在一个弹出层让用户长按保存
            // 或者直接下载
            const link = document.createElement('a');
            link.download = `给家长的教程_${Date.now()}.png`;
            link.href = resultCanvas.toDataURL('image/png');
            link.click();
            
            alert("生成成功！请在下载管理或相册中查看。如果是微信内打开，请长按生成的图片保存（如果有弹出预览的话）。");
        } catch (err) {
            console.error(err);
            alert("生成失败，请重试");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
