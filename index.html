<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>大字报截图批注器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --red: #E8211A; --red-light: #FEF0EF;
  --gray-bg: #F5F5F5; --gray-border: #E5E5E5;
  --gray-text: #999; --text: #1A1A1A; --white: #fff;
  --radius: 14px;
  --si-top: env(safe-area-inset-top,0px);
  --si-bottom: env(safe-area-inset-bottom,0px);
}
html { height: 100%; }
body {
  height: 100%; display: flex; flex-direction: column;
  background: var(--gray-bg);
  font-family: -apple-system,"PingFang SC","Hiragino Sans GB",sans-serif;
  color: var(--text); overflow: hidden;
}

/* topbar */
#topbar {
  flex-shrink: 0; display: flex; align-items: center;
  justify-content: space-between; padding: 12px 16px;
  padding-top: calc(12px + var(--si-top));
  background: var(--white); border-bottom: 0.5px solid var(--gray-border); z-index: 10;
}
#btn-back { width:36px;height:36px;background:var(--gray-bg);border:none;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer; }
#topbar-title { text-align:center; }
#topbar-title h1 { font-size:17px;font-weight:600;letter-spacing:-0.3px; }
#topbar-title p  { font-size:12px;color:var(--gray-text);margin-top:1px; }
#btn-clear { height:36px;padding:0 14px;background:var(--gray-bg);border:none;border-radius:10px;font-size:14px;color:var(--text);cursor:pointer;font-family:inherit; }

/* hint bar */
#hint-bar {
  flex-shrink:0;display:flex;align-items:center;gap:8px;
  background:#FFF8ED;border-bottom:0.5px solid #F5D99A;
  padding:9px 16px;font-size:13px;color:#8A6500;
}

/* canvas area — height locked at init, NEVER recalculated */
#canvas-area {
  flex-shrink:0;position:relative;background:#FAFAFA;
  overflow:hidden;touch-action:none;
}
#bg-img { display:block;width:100%;height:100%;object-fit:contain;pointer-events:none;position:absolute;top:0;left:0; }
#anno-canvas { position:absolute;top:0;left:0;pointer-events:none; }
#upload-prompt {
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  color:var(--gray-text);font-size:14px;pointer-events:none;
}
#upload-prompt .icon-wrap { width:64px;height:64px;background:var(--gray-bg);border-radius:18px;display:flex;align-items:center;justify-content:center; }
#tap-hint {
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.52);color:white;font-size:12px;
  padding:5px 14px;border-radius:20px;white-space:nowrap;pointer-events:none;display:none;
}

/* image strip */
#img-strip-wrap {
  flex-shrink:0;background:var(--white);border-top:0.5px solid var(--gray-border);
  display:flex;align-items:center;padding:8px 10px;gap:8px;
  overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
#img-strip-wrap::-webkit-scrollbar { display:none; }
.strip-thumb {
  flex-shrink:0;width:54px;height:54px;border-radius:8px;
  border:2px solid transparent;overflow:hidden;position:relative;cursor:pointer;background:var(--gray-bg);
}
.strip-thumb img { width:100%;height:100%;object-fit:cover;display:block;pointer-events:none; }
.strip-thumb.active { border-color:var(--red); }
.strip-badge {
  position:absolute;top:2px;right:3px;background:var(--red);color:white;
  font-size:10px;font-weight:700;width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.strip-del {
  position:absolute;bottom:2px;right:2px;width:16px;height:16px;border-radius:50%;
  background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;
  font-size:9px;color:white;cursor:pointer;line-height:1;
}
#strip-add {
  flex-shrink:0;width:54px;height:54px;border-radius:8px;
  border:1.5px dashed var(--gray-border);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  cursor:pointer;color:var(--gray-text);font-size:10px;background:transparent;
}

/* step panel */
#step-panel {
  flex:1;background:var(--white);border-top:0.5px solid var(--gray-border);
  overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;
}
.step-row { display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:0.5px solid var(--gray-border);animation:si .18s ease; }
@keyframes si { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:none} }
.step-badge { width:24px;height:24px;border-radius:50%;background:var(--red);color:white;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.step-input { flex:1;border:none;outline:none;font-size:16px;font-weight:600;color:var(--text);font-family:inherit;background:transparent; }
.step-input::placeholder { color:var(--gray-text);font-weight:400; }
.step-del { width:22px;height:22px;background:var(--gray-border);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#888;font-size:13px; }

/* action bar */
#action-bar {
  flex-shrink:0;background:var(--white);border-top:0.5px solid var(--gray-border);
  padding:10px 16px;padding-bottom:calc(10px + var(--si-bottom));
}
#action-row1 { display:flex;gap:8px;margin-bottom:10px; }
.action-btn {
  flex:1;height:50px;border:none;border-radius:var(--radius);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;font-family:inherit;transition:transform .1s;
}
.action-btn:active { transform:scale(.95); }
.action-btn span { font-size:11px;font-weight:500; }
.action-btn.active { background:var(--red-light)!important; }
.action-btn.active span { color:var(--red)!important; }
#btn-add { background:var(--red-light); }
#btn-add span { color:var(--red); }
#btn-edit,#btn-adjust { background:var(--gray-bg); }
#btn-edit span,#btn-adjust span { color:var(--text); }
#action-row2 { display:flex;gap:10px; }
#btn-addimg {
  flex:1;height:50px;background:var(--white);border:1.5px solid var(--gray-border);
  border-radius:var(--radius);font-size:14px;font-weight:600;color:var(--text);
  display:flex;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;font-family:inherit;transition:transform .1s;
}
#btn-addimg:active { transform:scale(.97); }
#btn-save {
  flex:2;height:50px;background:var(--red);border:none;border-radius:var(--radius);
  font-size:14px;font-weight:600;color:white;
  display:flex;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;font-family:inherit;transition:transform .1s;
}
#btn-save:active { transform:scale(.97); }

/* adjust overlay */
#adjust-panel {
  display:none;position:absolute;inset:0;background:rgba(0,0,0,.85);
  z-index:20;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;
}
#adjust-panel.show { display:flex; }
#adj-preview { border-radius:8px;max-width:100%;display:block;max-height:200px;object-fit:contain; }
.adj-row { width:100%;display:flex;align-items:center;gap:10px; }
.adj-lbl { color:rgba(255,255,255,.7);font-size:13px;width:48px;flex-shrink:0; }
.adj-row input[type=range] { flex:1;accent-color:var(--red); }
.adj-val { color:white;font-size:13px;width:38px;text-align:right;flex-shrink:0; }
#adj-btns { display:flex;gap:10px;width:100%;margin-top:4px; }
#btn-adj-cancel,#btn-adj-ok {
  flex:1;height:44px;border-radius:12px;border:none;
  font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;
}
#btn-adj-cancel { background:rgba(255,255,255,.15);color:white; }
#btn-adj-ok { background:var(--red);color:white; }

/* toast */
#toast {
  position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.7);color:white;font-size:14px;
  padding:8px 20px;border-radius:20px;display:none;white-space:nowrap;z-index:999;pointer-events:none;
}
#file-input { display:none; }
</style>
</head>
<body>

<div id="topbar">
  <button id="btn-back" aria-label="返回">
    <svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9L9 17" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div id="topbar-title"><h1>大字报截图批注器</h1><p>点一下，生成大字指引</p></div>
  <button id="btn-clear">清空</button>
</div>

<div id="hint-bar">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex-shrink:0"><circle cx="12" cy="12" r="10" stroke="#C49200" stroke-width="1.5"/><path d="M12 7v5l3 3" stroke="#C49200" stroke-width="1.5" stroke-linecap="round"/></svg>
  <span>使用方法：在图片上点击位置，添加指引文字</span>
</div>

<div id="canvas-area">
  <img id="bg-img" style="display:none" alt="">
  <canvas id="anno-canvas"></canvas>
  <div id="upload-prompt">
    <div class="icon-wrap">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="#BBB" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="#BBB"/><path d="M3 15l5-5 4 4 3-3 5 5" stroke="#BBB" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
    <span>点击下方「添加图片」上传截图</span>
  </div>
  <div id="tap-hint">👆 点击图片任意位置添加指引</div>

  <!-- Adjust overlay inside canvas so it sizes with it -->
  <div id="adjust-panel">
    <canvas id="adj-canvas" style="border-radius:8px;max-width:100%;max-height:200px;"></canvas>
    <div class="adj-row"><span class="adj-lbl">亮度</span><input type="range" id="sl-b" min="-80" max="80" value="0"><span class="adj-val" id="vl-b">0</span></div>
    <div class="adj-row"><span class="adj-lbl">对比度</span><input type="range" id="sl-c" min="-80" max="80" value="0"><span class="adj-val" id="vl-c">0</span></div>
    <div class="adj-row"><span class="adj-lbl">饱和度</span><input type="range" id="sl-s" min="-100" max="100" value="0"><span class="adj-val" id="vl-s">0</span></div>
    <div class="adj-row"><span class="adj-lbl">旋转</span><input type="range" id="sl-r" min="0" max="3" step="1" value="0"><span class="adj-val" id="vl-r">0°</span></div>
    <div id="adj-btns"><button id="btn-adj-cancel">取消</button><button id="btn-adj-ok">应用</button></div>
  </div>
</div>

<div id="img-strip-wrap">
  <div id="strip-add">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#AAA" stroke-width="2" stroke-linecap="round"/></svg>
    <span>添加</span>
  </div>
</div>

<div id="step-panel"></div>

<div id="action-bar">
  <div id="action-row1">
    <button class="action-btn active" id="btn-add">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#E8211A" stroke-width="2"/><path d="M12 8v8M8 12h8" stroke="#E8211A" stroke-width="2" stroke-linecap="round"/></svg>
      <span>添加指引</span>
    </button>
    <button class="action-btn" id="btn-edit">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="#333" stroke-width="1.8" stroke-linecap="round"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="#333" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>编辑文字</span>
    </button>
    <button class="action-btn" id="btn-adjust">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="#333" stroke-width="1.8" stroke-linecap="round"/><circle cx="8" cy="6" r="2" fill="white" stroke="#333" stroke-width="1.5"/><circle cx="16" cy="12" r="2" fill="white" stroke="#333" stroke-width="1.5"/><circle cx="10" cy="18" r="2" fill="white" stroke="#333" stroke-width="1.5"/></svg>
      <span>调整图片</span>
    </button>
  </div>
  <div id="action-row2">
    <button id="btn-addimg">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="#333" stroke-width="1.5"/><path d="M3 15l5-5 4 4 3-3 5 5" stroke="#333" stroke-width="1.5" stroke-linecap="round"/><path d="M18 7V3M16 5h4" stroke="#333" stroke-width="1.5" stroke-linecap="round"/></svg>
      添加图片
    </button>
    <button id="btn-save">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 16l-4-4h3V4h2v8h3l-4 4z" fill="white"/><path d="M4 20h16" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      保存/分享图片
    </button>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="file-input" accept="image/*" multiple>

<script>
/* ── State ── */
// page = { src, imgEl, annotations:[{x,y,text}], adj:{b,c,s,r}, adjSrc }
let pages = [], cur = 0, mode = 'add';

/* ── Elements ── */
const canvasArea   = document.getElementById('canvas-area');
const bgImg        = document.getElementById('bg-img');
const annoCanvas   = document.getElementById('anno-canvas');
const ctx          = annoCanvas.getContext('2d');
const stepPanel    = document.getElementById('step-panel');
const uploadPrompt = document.getElementById('upload-prompt');
const tapHint      = document.getElementById('tap-hint');
const fileInput    = document.getElementById('file-input');
const stripWrap    = document.getElementById('img-strip-wrap');
const stripAdd     = document.getElementById('strip-add');
const adjPanel     = document.getElementById('adjust-panel');
const adjCanvas    = document.getElementById('adj-canvas');
const adjCtx       = adjCanvas.getContext('2d');

/* ── Layout: lock canvas height once at start ── */
let lockedH = 0;
function initLayout() {
  const winH  = window.innerHeight;
  const used  = ['topbar','hint-bar','img-strip-wrap','action-bar']
                  .reduce((s, id) => s + document.getElementById(id).offsetHeight, 0);
  lockedH = Math.max(winH - used - 130, 120); // 130 = min step panel
  canvasArea.style.height = lockedH + 'px';
  annoCanvas.width  = canvasArea.offsetWidth;
  annoCanvas.height = lockedH;
  redraw();
}

/* ── Image loading ── */
function loadFiles(files) {
  [...files].forEach(f => {
    const r = new FileReader();
    r.onload = e => addPage(e.target.result);
    r.readAsDataURL(f);
  });
}
function addPage(src) {
  const img = new Image();
  img.onload = () => {
    pages.push({ src, imgEl: img, annotations: [], adj: {b:0,c:0,s:0,r:0}, adjSrc: null });
    cur = pages.length - 1;
    renderStrip();
    switchPage(cur);
  };
  img.src = src;
}
function switchPage(idx) {
  cur = idx;
  const pg = pages[idx];
  bgImg.src = pg.adjSrc || pg.src;
  bgImg.style.display = 'block';
  uploadPrompt.style.display = 'none';
  tapHint.style.display = 'block';
  annoCanvas.width  = canvasArea.offsetWidth;
  annoCanvas.height = lockedH;
  renderStepPanel();
  redraw();
  renderStrip();
}

/* ── Image rect ── */
function getImgRect() {
  const cw = annoCanvas.width, ch = annoCanvas.height;
  const pg = pages[cur];
  if (!pg) return { ox:0, oy:0, dw:cw, dh:ch, scale:1 };
  const img = pg.imgEl;
  const iw = img.naturalWidth, ih = img.naturalHeight;
  if (!iw || !ih) return { ox:0, oy:0, dw:cw, dh:ch, scale:1 };
  const scale = Math.min(cw / iw, ch / ih);
  const dw = iw * scale, dh = ih * scale;
  return { ox: (cw-dw)/2, oy: (ch-dh)/2, dw, dh, scale };
}

/* ── Draw annotation ── */
function drawOne(c, ann, idx, scale) {
  const { x, y, text } = ann;
  const num = idx + 1;
  const r   = Math.max(22, 26 * scale);
  const cw  = c.canvas.width;
  c.save();
  // ripples
  [r*1.6, r*2.3, r*3.1].forEach((pr, i) => {
    c.beginPath(); c.arc(x, y, pr, 0, Math.PI*2);
    c.strokeStyle = `rgba(232,33,26,${0.22 - i*0.06})`;
    c.lineWidth = Math.max(2.5, 3.5*scale); c.stroke();
  });
  // circle
  c.beginPath(); c.arc(x, y, r, 0, Math.PI*2);
  c.strokeStyle = '#E8211A'; c.lineWidth = Math.max(4, 5*scale); c.stroke();
  c.fillStyle = 'rgba(232,33,26,0.10)'; c.fill();
  // number
  c.beginPath(); c.arc(x, y, r*0.52, 0, Math.PI*2);
  c.fillStyle = '#E8211A'; c.fill();
  c.font = `700 ${Math.max(13,15*scale)}px -apple-system,PingFang SC,sans-serif`;
  c.fillStyle = 'white'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(num, x, y+0.5);
  // label
  const txt      = (text && text.trim()) ? text.trim() : '点这里！';
  const fontSize = Math.max(20, 26*scale);
  c.font = `700 ${fontSize}px -apple-system,PingFang SC,sans-serif`;
  const labelW = c.measureText(txt).width + Math.max(24, 28*scale);
  const labelH = Math.max(46, 52*scale);
  const rx2    = Math.max(8, 10*scale);
  const gap    = r * 3.0;
  const goRight = (cw - x) >= x;
  const lx = goRight ? x + gap : x - gap - labelW;
  const ly = y - labelH/2;
  const as = { x: goRight ? x+r*1.15 : x-r*1.15, y };
  const ae = { x: goRight ? lx : lx+labelW, y };
  // arrow
  c.beginPath(); c.moveTo(as.x, as.y); c.lineTo(ae.x, ae.y);
  c.strokeStyle = '#E8211A'; c.lineWidth = Math.max(3, 3.5*scale); c.stroke();
  const ang = Math.atan2(ae.y-as.y, ae.x-as.x), al = Math.max(10, 13*scale);
  c.beginPath(); c.moveTo(ae.x, ae.y);
  c.lineTo(ae.x - al*Math.cos(ang-0.38), ae.y - al*Math.sin(ang-0.38));
  c.lineTo(ae.x - al*Math.cos(ang+0.38), ae.y - al*Math.sin(ang+0.38));
  c.closePath(); c.fillStyle = '#E8211A'; c.fill();
  // box
  c.beginPath(); c.roundRect(lx, ly, labelW, labelH, rx2);
  c.strokeStyle = '#E8211A'; c.lineWidth = Math.max(2.5, 3*scale); c.stroke();
  c.fillStyle = 'rgba(255,255,255,0.97)'; c.fill();
  c.font = `700 ${fontSize}px -apple-system,PingFang SC,sans-serif`;
  c.fillStyle = '#E8211A'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(txt, lx+labelW/2, ly+labelH/2);
  c.restore();
}

function redraw() {
  ctx.clearRect(0, 0, annoCanvas.width, annoCanvas.height);
  if (!pages[cur]) return;
  const { scale } = getImgRect();
  pages[cur].annotations.forEach((a, i) => drawOne(ctx, a, i, scale));
}

/* ── Strip ── */
function renderStrip() {
  stripWrap.querySelectorAll('.strip-thumb').forEach(e => e.remove());
  pages.forEach((pg, i) => {
    const el = document.createElement('div');
    el.className = 'strip-thumb' + (i === cur ? ' active' : '');
    const cnt = pg.annotations.length;
    el.innerHTML = `<img src="${pg.adjSrc || pg.src}" alt=""><${cnt ? `div class="strip-badge">${cnt}</div` : 'span'}><div class="strip-del" data-i="${i}">✕</div>`;
    // cleaner thumb html
    el.innerHTML = `<img src="${pg.adjSrc || pg.src}" alt="">${cnt ? `<div class="strip-badge">${cnt}</div>` : ''}<div class="strip-del" data-i="${i}">✕</div>`;
    el.addEventListener('click', e => { if (!e.target.classList.contains('strip-del')) switchPage(i); });
    el.querySelector('.strip-del').addEventListener('click', e => { e.stopPropagation(); deletePage(i); });
    stripWrap.insertBefore(el, stripAdd);
  });
}
function deletePage(i) {
  pages.splice(i, 1);
  if (!pages.length) {
    bgImg.style.display = 'none'; uploadPrompt.style.display = 'flex';
    tapHint.style.display = 'none'; stepPanel.innerHTML = '';
    ctx.clearRect(0, 0, annoCanvas.width, annoCanvas.height); cur = 0;
  } else {
    cur = Math.min(cur, pages.length - 1); switchPage(cur);
  }
  renderStrip();
}

/* ── Step panel ── */
function renderStepPanel() {
  stepPanel.innerHTML = '';
  if (!pages[cur]) return;
  pages[cur].annotations.forEach((ann, i) => {
    const row = document.createElement('div');
    row.className = 'step-row';
    row.innerHTML = `<div class="step-badge">${i+1}</div><input class="step-input" type="text" value="${ann.text||''}" placeholder="点这里！" data-i="${i}" inputmode="text" enterkeyhint="done"><button class="step-del" data-i="${i}">✕</button>`;
    stepPanel.appendChild(row);
  });
  stepPanel.querySelectorAll('.step-input').forEach(inp => {
    inp.addEventListener('input', e => {
      pages[cur].annotations[+e.target.dataset.i].text = e.target.value;
      redraw(); renderStrip();
    });
    // scroll into view on focus but do NOT resize canvas
    inp.addEventListener('focus', e => setTimeout(() => e.target.scrollIntoView({behavior:'smooth',block:'nearest'}), 300));
  });
  stepPanel.querySelectorAll('.step-del').forEach(btn => {
    btn.addEventListener('click', e => {
      pages[cur].annotations.splice(+e.target.dataset.i, 1);
      renderStepPanel(); redraw(); renderStrip();
    });
  });
}

/* ── Tap ── */
function handleTap(cx, cy) {
  if (!pages[cur] || mode !== 'add') return;
  const rect = canvasArea.getBoundingClientRect();
  pages[cur].annotations.push({ x: cx - rect.left, y: cy - rect.top, text: '' });
  renderStepPanel(); redraw(); renderStrip();
  setTimeout(() => {
    const ins = stepPanel.querySelectorAll('.step-input');
    if (ins.length) ins[ins.length-1].focus();
  }, 80);
}
canvasArea.addEventListener('click', e => {
  if (e.target.closest('#adjust-panel')) return;
  handleTap(e.clientX, e.clientY);
});
canvasArea.addEventListener('touchend', e => {
  if (e.target.closest('#adjust-panel')) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  handleTap(t.clientX, t.clientY);
}, { passive: false });

/* ── Mode ── */
function setMode(m) {
  mode = m;
  document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
  const map = { add:'btn-add', edit:'btn-edit', adjust:'btn-adjust' };
  document.getElementById(map[m])?.classList.add('active');
}
document.getElementById('btn-add').addEventListener('click', () => setMode('add'));
document.getElementById('btn-edit').addEventListener('click', () => { setMode('edit'); showToast('在下方文字框修改说明内容'); });

/* ── Adjust panel ── */
let adjTemp = {b:0,c:0,s:0,r:0};

document.getElementById('btn-adjust').addEventListener('click', () => {
  if (!pages[cur]) { showToast('请先添加图片'); return; }
  setMode('adjust');
  adjTemp = { ...pages[cur].adj };
  document.getElementById('sl-b').value = adjTemp.b;
  document.getElementById('sl-c').value = adjTemp.c;
  document.getElementById('sl-s').value = adjTemp.s;
  document.getElementById('sl-r').value = adjTemp.r;
  updateAdjLabels(); renderAdjPreview();
  adjPanel.classList.add('show');
});

['b','c','s','r'].forEach(k => {
  document.getElementById('sl-'+k).addEventListener('input', () => {
    adjTemp[k] = +document.getElementById('sl-'+k).value;
    updateAdjLabels(); renderAdjPreview();
  });
});
function updateAdjLabels() {
  document.getElementById('vl-b').textContent = adjTemp.b;
  document.getElementById('vl-c').textContent = adjTemp.c;
  document.getElementById('vl-s').textContent = adjTemp.s;
  document.getElementById('vl-r').textContent = (adjTemp.r*90) + '°';
}

function applyAdj(c, canvas, adj) {
  const id = c.getImageData(0, 0, canvas.width, canvas.height), d = id.data;
  const br = adj.b, co = adj.c * 1.5, sat = adj.s / 100;
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i+1], b = d[i+2];
    r += br; g += br; b += br;
    r = (r - 128) * (1 + co/100) + 128;
    g = (g - 128) * (1 + co/100) + 128;
    b = (b - 128) * (1 + co/100) + 128;
    const gr = 0.299*r + 0.587*g + 0.114*b;
    r = gr + (r-gr)*(1+sat); g = gr + (g-gr)*(1+sat); b = gr + (b-gr)*(1+sat);
    d[i]   = Math.max(0, Math.min(255, r));
    d[i+1] = Math.max(0, Math.min(255, g));
    d[i+2] = Math.max(0, Math.min(255, b));
  }
  c.putImageData(id, 0, 0);
}

function bakeImage(img, adj) {
  const rot = adj.r % 4, swap = rot % 2 === 1;
  const ow = img.naturalWidth, oh = img.naturalHeight;
  const cw = swap ? oh : ow, ch = swap ? ow : oh;
  const c2 = document.createElement('canvas');
  c2.width = cw; c2.height = ch;
  const x2 = c2.getContext('2d');
  x2.save(); x2.translate(cw/2, ch/2); x2.rotate(rot * Math.PI/2);
  x2.drawImage(img, -ow/2, -oh/2, ow, oh);
  x2.restore();
  applyAdj(x2, c2, adj);
  return c2;
}

function renderAdjPreview() {
  const img = pages[cur].imgEl;
  const baked = bakeImage(img, adjTemp);
  const maxW = adjPanel.offsetWidth - 40, maxH = 200;
  const scale = Math.min(maxW / baked.width, maxH / baked.height, 1);
  adjCanvas.width  = Math.round(baked.width  * scale);
  adjCanvas.height = Math.round(baked.height * scale);
  adjCtx.drawImage(baked, 0, 0, adjCanvas.width, adjCanvas.height);
}

document.getElementById('btn-adj-cancel').addEventListener('click', () => {
  adjPanel.classList.remove('show'); setMode('add');
});
document.getElementById('btn-adj-ok').addEventListener('click', () => {
  const pg = pages[cur];
  pg.adj = { ...adjTemp };
  const baked = bakeImage(pg.imgEl, adjTemp);
  const newSrc = baked.toDataURL('image/png');
  const newImg = new Image();
  newImg.onload = () => {
    pg.adjSrc = newSrc; pg.imgEl = newImg;
    bgImg.src = newSrc;
    adjPanel.classList.remove('show'); setMode('add');
    redraw(); renderStrip(); showToast('已应用调整');
  };
  newImg.src = newSrc;
});

/* ── File buttons ── */
document.getElementById('btn-addimg').addEventListener('click', () => fileInput.click());
stripAdd.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files.length) loadFiles(e.target.files); fileInput.value=''; });
document.getElementById('btn-clear').addEventListener('click', () => {
  if (!pages[cur]) return;
  pages[cur].annotations = [];
  renderStepPanel(); redraw(); renderStrip();
});
document.getElementById('btn-back').addEventListener('click', () => { if (history.length > 1) history.back(); });
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const r = new FileReader();
      r.onload = ev => addPage(ev.target.result);
      r.readAsDataURL(item.getAsFile());
      break;
    }
  }
});

/* ── Save ── */
document.getElementById('btn-save').addEventListener('click', async () => {
  if (!pages[cur]) { showToast('请先添加图片'); return; }
  const pg = pages[cur];
  const { ox, oy, dw, scale: ds } = getImgRect();
  const img = pg.imgEl;
  const ec  = document.createElement('canvas');
  ec.width = img.naturalWidth; ec.height = img.naturalHeight;
  const ectx = ec.getContext('2d');
  ectx.drawImage(img, 0, 0);
  const sb = img.naturalWidth / dw; // scaleBack
  const es = sb * ds;               // exportScale: makes annotations same visual size
  pg.annotations.forEach((ann, i) => {
    drawOne(ectx, { ...ann, x: (ann.x - ox)*sb, y: (ann.y - oy)*sb }, i, es);
  });
  ec.toBlob(async blob => {
    const file = new File([blob], '批注.png', { type:'image/png' });
    if (navigator.share && navigator.canShare?.({ files:[file] })) {
      try { await navigator.share({ files:[file], title:'大字报截图批注' }); return; } catch {}
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = '批注图片.png'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 3000);
    showToast('图片已保存');
  }, 'image/png');
});

/* ── Toast ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display='none'; }, 2200);
}

/* ── Init ── */
requestAnimationFrame(() => setTimeout(initLayout, 60));
window.addEventListener('orientationchange', () => setTimeout(initLayout, 350));
</script>
